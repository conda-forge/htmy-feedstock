schema_version: 1

context:
  version: "0.12.1"
  python_min: "3.11"

package:
  name: htmy
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/h/htmy/htmy-${{ version }}.tar.gz
    sha256: 3dd1b3b67e0561f10494ba8b74be9ea7aff3afec763e7ee384c4c9ba261184f0

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pdm-backend
    - pip
  run:
    - python >=${{ python_min }}
    - anyio >=4.7.0,<5
    - markdown >=3.8,<4

tests:
  - python:
      imports:
        - htmy
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/volfpeter/htmy
  summary: Async, pure-Python server-side rendering engine.

extra:
  recipe-maintainers:
    - davidbrochart
